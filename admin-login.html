<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для администратора - ДЖД Казань</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #003366 0%, #001a33 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-width: 450px; width: 100%; padding: 50px; text-align: center; }
        .lock-icon { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #003366; font-size: 32px; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; color: #003366; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        input:focus { outline: none; border-color: #003366; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
        .login-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #cc0000 0%, #990000 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(204, 0, 0, 0.4); }
        .error-msg { color: #cc0000; margin-top: 15px; display: none; padding: 10px; background: #ffe6e6; border-radius: 8px; }
        .back-link { display: inline-block; margin-top: 20px; color: #003366; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .hint { margin-top: 20px; padding: 15px; background: #f0f8ff; border-radius: 10px; font-size: 13px; color: #666; }
        .hint strong { color: #003366; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="lock-icon">🔒</div>
        <h1>Вход для администратора</h1>
        <p class="subtitle">Панель управления сайтом ДЖД Казань</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">👤 Логин</label>
                <input type="text" id="username" required placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label for="password">🔑 Пароль</label>
                <input type="password" id="password" required placeholder="Введите пароль">
            </div>
            <button type="submit" class="login-btn">🚀 Войти</button>
            <div class="error-msg" id="errorMsg">❌ Неверный логин или пароль!</div>
        </form>
        <div class="hint">
            <strong>Доступ:</strong> логин <code>admin</code>, пароль <code>djd2026kaz</code>
        </div>
        <a href="index.html" class="back-link">← Вернуться на сайт</a>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === 'admin' && password === 'djd2026kaz') {
                sessionStorage.setItem('djd_admin_logged', 'true');
                window.location.href = 'admin-form.html';
            } else { 
                document.getElementById('errorMsg').style.display = 'block'; 
            }
        });
    </script>
</body>
</html>
